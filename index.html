<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>US &amp; Canada Macro Dashboard</title>
<style>
  :root {
    --bg:#0a0f1e; --panel:#0d1526; --panel2:#111a30; --line:rgba(255,255,255,0.08);
    --text:#eef2ff; --muted:#8892b0; --muted2:#64708f; --accent:#818cf8; --accent2:#38bdf8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(56,189,248,0.10), transparent 60%),
      radial-gradient(900px 500px at -5% 0%, rgba(129,140,248,0.12), transparent 55%),
      var(--bg);
    color: var(--text);
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh; overflow: hidden;
  }
  header.shell {
    display: flex; align-items: center; gap: 18px; padding: 11px 22px;
    border-bottom: 1px solid var(--line); background: rgba(13,21,38,0.82);
    backdrop-filter: blur(8px); z-index: 20; flex: none;
  }
  .brand { display: flex; align-items: center; gap: 13px; min-width: 0; }
  .flag {
    font-size: 20px; width: 40px; height: 40px; display: grid; place-items: center;
    background: linear-gradient(135deg, #818cf8, #6366f1); border-radius: 11px;
    box-shadow: 0 6px 16px rgba(99,102,241,0.35); flex: none;
  }
  h1 { font-size: 17px; margin: 0; letter-spacing: .2px; white-space: nowrap; }
  .sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; white-space: nowrap; }
  .spacer { flex: 1; }
  .tabs { display: flex; gap: 6px; background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    padding: 5px; border-radius: 14px; }
  .tab {
    display: flex; align-items: center; gap: 8px; border: 1px solid transparent; background: transparent;
    color: var(--muted); font: inherit; font-size: 13.5px; font-weight: 650; padding: 8px 15px;
    border-radius: 10px; cursor: pointer; transition: background .14s, color .14s, box-shadow .14s;
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .tab.active { color: #fff; background: linear-gradient(135deg, #818cf8, #6366f1);
    border-color: rgba(129,140,248,0.5); box-shadow: 0 4px 14px rgba(99,102,241,0.32); }
  .tab .ico { font-size: 16px; line-height: 1; }
  .kbd { font-size: 10px; color: var(--muted2); border: 1px solid var(--line); border-radius: 5px;
    padding: 1px 5px; margin-left: 2px; font-weight: 700; }
  .tab.active .kbd { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.35); }
  .stage { position: relative; flex: 1; min-height: 0; }
  iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: var(--bg); }
  iframe.hidden { display: none; }
  .loader { position: absolute; inset: 0; display: grid; place-items: center; color: var(--muted);
    font-size: 13px; letter-spacing: .3px; }
  @media (max-width: 820px) {
    header.shell { padding: 9px 12px; gap: 10px; }
    .sub { display: none; } h1 { font-size: 15px; }
    .tab { padding: 7px 10px; font-size: 12.5px; } .tab .kbd { display: none; }
  }
</style>
</head>
<body>
<header class="shell">
  <div class="brand">
    <div class="flag">📊</div>
    <div>
      <h1>US &amp; Canada Macro Dashboard</h1>
      <div class="sub">Macro indicators · Canadian house prices · Bank of Canada Business Outlook</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="tabs" role="tablist" aria-label="Dashboards">
    <button class="tab active" id="tab-macro" role="tab" aria-selected="true">
      <span class="ico">📊</span> Macro Indicators <span class="kbd">1</span>
    </button>
    <button class="tab" id="tab-housing" role="tab" aria-selected="false">
      <span class="ico">🏠</span> Housing Prices <span class="kbd">2</span>
    </button>
    <button class="tab" id="tab-bos" role="tab" aria-selected="false">
      <span class="ico">🏢</span> Business Outlook <span class="kbd">3</span>
    </button>
  </div>
</header>

<div class="stage">
  <div class="loader" id="loader">Loading…</div>
  <iframe id="fr-macro"   title="US & Canada Macro Indicators" class="hidden" loading="eager"></iframe>
  <iframe id="fr-housing" title="Canada Housing Price Indices"  class="hidden" loading="eager"></iframe>
  <iframe id="fr-bos"     title="Bank of Canada Business Outlook Survey" class="hidden" loading="eager"></iframe>
</div>

<script>
(function () {
  const TABS = {
    macro:   { btn: document.getElementById("tab-macro"),   fr: document.getElementById("fr-macro"),   src: "macro.html" },
    housing: { btn: document.getElementById("tab-housing"), fr: document.getElementById("fr-housing"), src: "housing/index.html" },
    bos:     { btn: document.getElementById("tab-bos"),     fr: document.getElementById("fr-bos"),     src: "bos/index.html" },
  };
  const ORDER = ["macro", "housing", "bos"];
  const KEY = "usca_dash_tab", loader = document.getElementById("loader");
  const TITLE = { macro: "Macro Indicators", housing: "Housing Prices", bos: "Business Outlook" };

  function select(name, push) {
    if (!TABS[name]) name = "macro";
    ORDER.forEach(k => {
      const t = TABS[k], on = (k === name);
      t.btn.classList.toggle("active", on);
      t.btn.setAttribute("aria-selected", on ? "true" : "false");
      if (on && !t.fr.getAttribute("src")) {                 // lazy-load on first activation
        loader.style.display = "grid";
        t.fr.addEventListener("load", () => { loader.style.display = "none"; }, { once: true });
        t.fr.setAttribute("src", t.src);
      } else if (on) {
        loader.style.display = "none";
      }
      t.fr.classList.toggle("hidden", !on);
    });
    try { localStorage.setItem(KEY, name); } catch (e) {}
    if (push && location.hash.slice(1) !== name) history.replaceState(null, "", "#" + name);
    document.title = TITLE[name] + " · US & Canada Macro Dashboard";
  }

  ORDER.forEach(k => TABS[k].btn.addEventListener("click", () => select(k, true)));
  window.addEventListener("hashchange", () => select(location.hash.slice(1), false));
  document.addEventListener("keydown", e => {
    const tag = (e.target && e.target.tagName) || "";
    if (tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA") return;
    if (e.key === "1") select("macro", true);
    else if (e.key === "2") select("housing", true);
    else if (e.key === "3") select("bos", true);
  });

  let initial = location.hash.slice(1);
  if (!TABS[initial]) { try { initial = localStorage.getItem(KEY); } catch (e) {} }
  select(TABS[initial] ? initial : "macro", true);
})();
</script>
</body>
</html>
