<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US &amp; Canada Macro Indicators Dashboard</title>
<script src="chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#172033; --line:#334155;
    --text:#e2e8f0; --muted:#94a3b8; --ca:#ef4444; --us:#3b82f6; --accent:#38bdf8;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--text);}
  header{padding:24px 28px 16px;border-bottom:1px solid var(--line);background:var(--panel2);}
  header h1{margin:0;font-size:22px;font-weight:650;letter-spacing:.2px;}
  header p{margin:6px 0 0;color:var(--muted);font-size:13px;}
  .legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 5px 0 14px;vertical-align:middle;}
  .wrap{display:flex;min-height:calc(100vh - 92px);}
  nav{width:280px;flex-shrink:0;background:var(--panel2);border-right:1px solid var(--line);padding:12px 0;overflow-y:auto;}
  nav button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--muted);
    padding:11px 22px;font-size:13.5px;cursor:pointer;border-left:3px solid transparent;transition:.12s;}
  nav button:hover{background:var(--panel);color:var(--text);}
  nav button.active{color:#fff;background:var(--panel);border-left-color:var(--accent);font-weight:600;}
  nav button .ct{display:block;font-size:11px;color:var(--accent);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
  main{flex:1;padding:26px 30px;overflow-y:auto;}
  .tab-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:6px;}
  .tab-head h2{margin:0;font-size:20px;}
  .tab-head .meta{color:var(--muted);font-size:12.5px;margin-top:4px;}
  .desc{color:var(--muted);font-size:13.5px;margin:10px 0 18px;max-width:760px;line-height:1.5;}
  .cards{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 18px;min-width:180px;}
  .card .lbl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .card .val{font-size:24px;font-weight:680;margin-top:4px;}
  .card .sub{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .card.ca .val{color:var(--ca);} .card.us .val{color:var(--us);}
  .chart-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 18px 8px;height:460px;position:relative;}
  .src{color:var(--muted);font-size:11.5px;margin-top:14px;line-height:1.6;}
  footer{padding:14px 30px;color:var(--muted);font-size:12px;border-top:1px solid var(--line);}
</style>
</head>
<body>
<header>
  <h1>US &amp; Canada Macro Indicators</h1>
  <p>
    Interactive dashboard &middot; one chart per indicator
    <span class="legend-dot" style="background:var(--ca)"></span>Canada
    <span class="legend-dot" style="background:var(--us)"></span>United States
  </p>
</header>
<div class="wrap">
  <nav id="nav"></nav>
  <main>
    <div class="tab-head">
      <div>
        <h2 id="t-name">&nbsp;</h2>
        <div class="meta" id="t-meta"></div>
      </div>
    </div>
    <div class="desc" id="t-desc"></div>
    <div class="cards" id="t-cards"></div>
    <div class="chart-box"><canvas id="chart"></canvas></div>
    <div class="src" id="t-src"></div>
  </main>
</div>
<footer id="foot"></footer>

<script>
let DB = null, chart = null, active = 0;
const COL = {ca:'#ef4444', us:'#3b82f6'};

function fmt(v){
  if(v===null||v===undefined||v==='') return '\u2014';
  const n = Number(v);
  if(!isFinite(n)) return v;
  if(Math.abs(n) >= 1000) return n.toLocaleString(undefined,{maximumFractionDigits:0});
  return n.toLocaleString(undefined,{maximumFractionDigits:2});
}

function buildNav(){
  const nav = document.getElementById('nav');
  DB.indicators.forEach((ind, i) => {
    const b = document.createElement('button');
    b.innerHTML = ind.name + '<span class="ct">' + ind.chartType + ' chart</span>';
    b.onclick = () => select(i);
    nav.appendChild(b);
  });
}

function datasetFor(ind, key, color, axisId){
  const isBar = ind.chartType === 'bar';
  const isArea = ind.chartType === 'area';
  const isStep = ind.chartType === 'stepped';
  const ds = {
    label: key === 'canada' ? 'Canada' : 'United States',
    data: ind[key].values.map(v => v===null?null:Number(v)),
    borderColor: color,
    backgroundColor: isBar ? color + 'cc' : (isArea ? color + '33' : color),
    borderWidth: isBar ? 0 : 2,
    pointRadius: 0,
    pointHoverRadius: 4,
    tension: 0.25,
    spanGaps: true,
    fill: isArea ? 'origin' : false,
    stepped: isStep ? 'before' : false,
  };
  if(axisId) ds.yAxisID = axisId;
  return ds;
}

function select(i){
  active = i;
  const ind = DB.indicators[i];
  document.querySelectorAll('#nav button').forEach((b,idx)=>b.classList.toggle('active', idx===i));
  document.getElementById('t-name').textContent = ind.name;
  document.getElementById('t-meta').textContent =
    [ind.frequency, ind.unit].filter(Boolean).join('  \u00b7  ') + '   \u00b7   ' + ind.dates.length + ' observations';
  document.getElementById('t-desc').textContent = ind.description || '';

  // cards
  const cards = document.getElementById('t-cards');
  cards.innerHTML = '';
  [['canada','Canada','ca'],['us','United States','us']].forEach(([k,label,cls])=>{
    const m = ind[k];
    const c = document.createElement('div');
    c.className = 'card ' + cls;
    c.innerHTML = '<div class="lbl">' + label + ' \u2014 latest</div>' +
      '<div class="val">' + fmt(m.latestValue) + '</div>' +
      '<div class="sub">' + (m.latestDate ? 'as of ' + m.latestDate.slice(0,10) : 'no data') + '</div>';
    cards.appendChild(c);
  });

  // sources
  document.getElementById('t-src').innerHTML =
    'Sources &mdash; Canada: ' + (ind.canada.source || 'n/a') +
    '<br>United States: ' + (ind.us.source || 'n/a');

  drawChart(ind);
}

function drawChart(ind){
  if(chart) chart.destroy();
  const ctx = document.getElementById('chart');
  const baseType = (ind.chartType === 'bar') ? 'bar' : 'line';
  const datasets = [datasetFor(ind,'canada',COL.ca, ind.dualAxis ? 'yCA' : undefined)];
  // only add US dataset if it has any data
  if(ind.us.values.some(v=>v!==null && v!==undefined))
    datasets.push(datasetFor(ind,'us',COL.us, ind.dualAxis ? 'yUS' : undefined));

  const scales = {
    x:{ ticks:{ color:'#94a3b8', maxTicksLimit:14, autoSkip:true }, grid:{ color:'#1f2c40' } }
  };
  if(ind.dualAxis){
    scales.yCA = { position:'left', ticks:{color:COL.ca}, grid:{color:'#1f2c40'},
                   title:{display:true,text:'Canada ('+(ind.canada.unit||'')+')',color:COL.ca} };
    scales.yUS = { position:'right', ticks:{color:COL.us}, grid:{drawOnChartArea:false},
                   title:{display:true,text:'US ('+(ind.us.unit||'')+')',color:COL.us} };
  } else {
    scales.y = { ticks:{color:'#94a3b8'}, grid:{color:'#1f2c40'},
                 title:{display:!!ind.unit, text:ind.unit, color:'#94a3b8'} };
  }

  chart = new Chart(ctx, {
    type: baseType,
    data: { labels: ind.dates, datasets },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ labels:{ color:'#e2e8f0', usePointStyle:true } },
        tooltip:{ backgroundColor:'#0f172a', borderColor:'#334155', borderWidth:1 }
      },
      scales
    }
  });
}

function init(db){
  DB = db;
  document.getElementById('foot').textContent =
    'Source: ' + db.source + '  \u00b7  generated ' + db.generated +
    '  \u00b7  ' + db.indicators.length + ' indicators';
  buildNav();
  select(0);
}

if (window.MACRO_DATA) {
  // Embedded data (works when opened directly via file:// or over HTTP).
  init(window.MACRO_DATA);
} else {
  // Fallback: fetch when served over HTTP without data.js.
  fetch('data.json').then(r=>r.json()).then(init).catch(e=>{
    document.querySelector('main').innerHTML =
      '<p style="color:#ef4444">Could not load data. Re-run <code>python3 generate_data.py</code>, ' +
      'or serve this folder over HTTP (see README).</p>';
  });
}
</script>
</body>
</html>
